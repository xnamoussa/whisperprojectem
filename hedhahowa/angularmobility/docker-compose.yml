services:
  backend:
    build: .
    container_name: mobility-backend
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql://root:@host.docker.internal:3306/datawhehousebi
      - SECRET_KEY=django-insecure-hh1g0_=^0_&vt8=#*$$%_@!rv5+=jw$$2_*ffwg=@vd-sjo&%rnr
      - DEBUG=True
      - EMAIL_HOST_USER=emna.awini.work@gmail.com
      - EMAIL_HOST_PASSWORD=pssmaxzxgfeyfqlf
      - EMAIL_PORT=465
      - EMAIL_USE_SSL=True
      - EMAIL_USE_TLS=False
      - DJANGO_SETTINGS_MODULE=backend.settings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/dashboard/automation/status/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: mobility-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: mobility-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_BASIC_AUTH_ACTIVE=false
      - GENERIC_TIMEZONE=Africa/Tunis
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      backend:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  ml-api:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: mobility-ml-api
    volumes:
      - ./ml_service:/app
    ports:
      - "8001:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mobility-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./ml_service/mlruns:/app/mlruns
      - ./ml_service/mlflow_db:/app/mlflow_db
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///app/mlflow_db/mlflow.db --default-artifact-root /app/mlruns
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: mobility-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - ml-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: mobility-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  n8n_data:
  grafana_data:
